name: Supabase keep-alive

# The Cloudflare adapter is v13 (no worker.ts / scheduled() cron handler), so
# the daily keep-alive lives here instead. It hits the GET /api/heartbeat
# endpoint, which runs the heartbeat() RPC -> one activity_log row, resetting
# Supabase's ~7-day free-tier inactivity pause. GET (not POST) so Astro's
# security.checkOrigin doesn't reject it.
#
# Required repo secret: CRON_SECRET  (must equal the Worker's CRON_SECRET)
# Set at: Settings -> Secrets and variables -> Actions -> New repository secret

on:
  schedule:
    - cron: '7 3 * * *'   # 03:07 UTC daily (10:07 WIB)
  workflow_dispatch:       # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping heartbeat
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          code=$(curl -s -o /tmp/body.txt -w '%{http_code}' \
            "https://yayasanalhidayah.com/api/heartbeat" \
            -H "x-cron-secret: $CRON_SECRET")
          echo "HTTP $code"; cat /tmp/body.txt; echo
          test "$code" = "200"
