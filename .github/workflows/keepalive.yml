name: Supabase keep-alive

# FALLBACK keep-alive. The PRIMARY keep-alive is the standalone Cloudflare Worker
# in cron-keepalive/ (deployed separately). This Action does the same job — GET
# /api/heartbeat with CRON_SECRET (GET so Astro's security.checkOrigin doesn't
# 403 it) to reset Supabase's ~7-day pause — and is kept as a backup in case the
# CF cron ever stops. It only runs when GitHub Actions billing is active.
#
# Required repo secret: CRON_SECRET  (must equal the Worker's CRON_SECRET)
# Set via: gh secret set CRON_SECRET --repo <owner>/yayasanalhidayah

on:
  schedule:
    - cron: '7 3 * * *'   # 03:07 UTC daily (10:07 WIB)
  workflow_dispatch:       # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping heartbeat
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          code=$(curl -s -o /tmp/body.txt -w '%{http_code}' \
            "https://yayasanalhidayah.com/api/heartbeat" \
            -H "x-cron-secret: $CRON_SECRET")
          echo "HTTP $code"; cat /tmp/body.txt; echo
          test "$code" = "200"
